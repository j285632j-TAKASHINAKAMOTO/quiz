    question: "個人情報保護法に照らして、違法となるX社の行為はどれか。（X社は自社製品の販売促進セミナでアンケートを実施。利用目的は自社製品の案内と明示）",
    choices: { ア: "回収したアンケート用紙から顧客リストを作成し、案内を希望している顧客にダイレクトメールを発送した", イ: "回収したアンケート用紙と顧客リストは、必要時以外は鍵付きロッカーに保管する措置をとった", ウ: "関連会社Y社の製品販売促進のために、X社の独自判断で、顧客リストをY社に手渡しした", エ: "案内を希望している顧客から住所変更の連絡があったので、本人確認の上、顧客リストを訂正した" },
    answer: "ウ",
    explanation: "個人情報は本人が同意した目的以外に使用できません。Y社への提供は目的外利用となり違法です。"
  }
];

const fieldColors = {
  ネットワーク: "#3b82f6", データベース: "#8b5cf6", セキュリティ: "#ef4444",
  アルゴリズム: "#f59e0b", ハードウェア: "#10b981", オペレーティングシステム: "#6366f1",
  情報理論: "#ec4899", ソフトウェア開発: "#14b8a6", データ構造: "#f97316",
  プロジェクトマネジメント: "#84cc16", テクノロジ: "#0ea5e9",
  マネジメント: "#8b5cf6", ストラテジ: "#f43f5e"
};

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

let shuffledQuestions = shuffle(questions);
  state = { current: 0, selected: null, score: 0, finished: false, answers: [] };

function render() {
  const app = document.getElementById('app');
  state.finished ? renderFinished(app) : renderQuestion(app);
}

function renderFinished(app) {
  const pct = Math.round((state.score / shuffledQuestions.length) * 100);
  const grade = pct >= 80 ? "合格ライン突破！🎉" : pct >= 60 ? "もう少し！" : "要復習📚";
  const icon = pct >= 80 ? "🏆" : pct >= 60 ? "📝" : "💪";
  const dots = state.answers.map(a =>
    `<div style="width:28px;height:28px;border-radius:50%;background:${a.correct ? '#10b981' : '#ef4444'};display:flex;align-items:center;justify-content:center;color:white;font-size:14px;font-weight:bold;">${a.correct ? '○' : '×'}</div>`
  ).join('');
  app.innerHTML = `
    <div style="min-height:100vh;min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:16px;width:100%;">
      <div style="background:white;border-radius:20px;padding:32px 24px;max-width:480px;width:100%;text-align:center;box-shadow:0 25px 60px rgba(0,0,0,0.4);">
        <div style="font-size:56px;margin-bottom:8px;">${icon}</div>
        <h2 style="font-size:22px;font-weight:bold;color:#1e1b4b;margin-bottom:8px;">クイズ終了！</h2>
        <p style="font-size:16px;color:#6b7280;margin-bottom:20px;">${grade}</p>
        <div style="background:#f5f3ff;border-radius:16px;padding:20px;margin-bottom:20px;">
          <div style="font-size:48px;font-weight:bold;color:#4f46e5;">${state.score} <span style="font-size:24px;color:#6b7280;">/ ${shuffledQuestions.length}</span></div>
          <div style="font-size:16px;color:#6b7280;margin-top:4px;">正解率 ${pct}%</div>
        </div>
        <div style="display:flex;gap:5px;justify-content:center;margin-bottom:24px;flex-wrap:wrap;">${dots}</div>
        <button onclick="restart()" style="background:linear-gradient(135deg,#4f46e5,#7c3aed);color:white;border:none;border-radius:12px;padding:14px;font-size:16px;font-weight:bold;cursor:pointer;width:100%;">もう一度挑戦する</button>
      </div>
    </div>`;
}

function renderQuestion(app) {
  const q = shuffledQuestions[state.current];
  const fieldColor = fieldColors[q.field] || "#6b7280";
  const sel = state.selected;
  const isCorrect = sel === q.answer;
  const progress = ((state.current + (sel ? 1 : 0)) / shuffledQuestions.length) * 100;

  const choiceButtons = Object.entries(q.choices).map(([key, val]) => {
    let bg = 'white', border = '2px solid #e5e7eb', color = '#374151', shadow = 'none';
    let circBg = '#f3f4f6', circColor = '#6b7280';
    if (sel) {
      if (key === q.answer) { bg='#d1fae5'; border='2px solid #10b981'; color='#065f46'; shadow='0 4px 12px rgba(16,185,129,0.2)'; circBg='#10b981'; circColor='white'; }
      else if (key === sel) { bg='#fee2e2'; border='2px solid #ef4444'; color='#991b1b'; circBg='#ef4444'; circColor='white'; }
    }
    const disabled = sel ? 'disabled' : '';
    const hover = sel ? '' : `onmouseenter="this.style.background='#f5f3ff';this.style.borderColor='#8b5cf6'" onmouseleave="this.style.background='white';this.style.borderColor='#e5e7eb'"`;
    return `<button ${disabled} onclick="selectAnswer('${key}')" ${hover} style="background:${bg};border:${border};border-radius:12px;padding:13px 14px;text-align:left;cursor:${sel?'default':'pointer'};color:${color};font-size:14px;display:flex;align-items:center;gap:12px;box-shadow:${shadow};width:100%;-webkit-tap-highlight-color:transparent;"><span style="min-width:30px;height:30px;border-radius:50%;background:${circBg};color:${circColor};display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:13px;flex-shrink:0;">${key}</span><span style="line-height:1.5;">${val}</span></button>`;
  }).join('');

  const nextBtn = sel ? `<button onclick="nextQuestion()" style="margin-top:14px;width:100%;background:linear-gradient(135deg,#4f46e5,#7c3aed);color:white;border:none;border-radius:12px;padding:14px 0;font-size:16px;font-weight:bold;cursor:pointer;-webkit-tap-highlight-color:transparent;">${state.current+1<shuffledQuestions.length?'次の問題へ →':'結果を見る'}</button>` : '';

  const resultPanel = sel ? `
    <div style="background:white;border-radius:16px;padding:20px;box-shadow:0 8px 30px rgba(0,0,0,0.25);display:flex;flex-direction:column;align-items:center;gap:14px;">
      <div style="display:flex;align-items:center;gap:14px;width:100%;">
        <div style="width:72px;height:72px;flex-shrink:0;border-radius:50%;background:${isCorrect?'linear-gradient(135deg,#10b981,#34d399)':'linear-gradient(135deg,#ef4444,#f87171)'};display:flex;align-items:center;justify-content:center;box-shadow:${isCorrect?'0 4px 16px rgba(16,185,129,0.4)':'0 4px 16px rgba(239,68,68,0.4)'};animation:pop 0.3s ease;">
          <span style="font-size:38px;color:white;line-height:1;font-weight:bold;">${isCorrect?'○':'×'}</span>
        </div>
        <p style="font-size:18px;font-weight:bold;color:${isCorrect?'#065f46':'#991b1b'};margin:0;">${isCorrect?'正解！':`不正解<br><span style="font-size:14px;">(正解：${q.answer})</span>`}</p>
      </div>
      <div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:14px 16px;width:100%;">
        <p style="font-size:11px;font-weight:bold;color:#64748b;margin-bottom:5px;letter-spacing:1px;">解説</p>
        <p style="font-size:13px;color:#334155;line-height:1.7;margin:0;">${q.explanation}</p>
      </div>
      <div style="display:flex;gap:4px;flex-wrap:wrap;justify-content:center;">
        ${state.answers.map(a=>`<div style="width:20px;height:20px;border-radius:50%;background:${a.correct?'#10b981':'#ef4444'};display:flex;align-items:center;justify-content:center;color:white;font-size:10px;font-weight:bold;">${a.correct?'○':'×'}</div>`).join('')}
      </div>
    </div>` : '';

  app.innerHTML = `
    <div style="max-width:680px;width:100%;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
        <h1 style="color:white;font-size:15px;font-weight:bold;margin:0;">基本情報技術者 模擬問題</h1>
        <div style="color:#a5b4fc;font-size:14px;">${state.current+1} / ${shuffledQuestions.length}問</div>
      </div>
      <div style="background:rgba(255,255,255,0.15);border-radius:99px;height:5px;margin-bottom:12px;">
        <div style="background:linear-gradient(90deg,#818cf8,#c084fc);border-radius:99px;height:5px;width:${progress}%;transition:width 0.4s ease;"></div>
      </div>
      <div style="display:flex;flex-direction:column;gap:12px;">
        <div style="background:white;border-radius:16px;padding:20px;box-shadow:0 8px 30px rgba(0,0,0,0.25);">
          <div style="margin-bottom:12px;">
            <span style="background:${fieldColor};color:white;border-radius:99px;padding:3px 12px;font-size:11px;font-weight:bold;">${q.field}</span>
          </div>
          <p style="font-size:15px;font-weight:bold;color:#1e1b4b;line-height:1.7;margin-bottom:${q.diagram ? '12px' : '18px'}">問${state.current+1}. ${q.question}</p>
          ${q.diagram ? `<div style="margin-bottom:14px;background:#f8fafc;border-radius:10px;padding:10px;text-align:center;overflow-x:auto;-webkit-overflow-scrolling:touch;">${q.diagram}</div>` : ''}
          <div style="display:flex;flex-direction:column;gap:8px;">${choiceButtons}</div>
          ${nextBtn}
        </div>
        ${resultPanel}
      </div>
    </div>`;
}

function selectAnswer(key) {
  if (state.selected !== null) return;
  state.selected = key;
  const correct = key === questions[state.current].answer;
  if (correct) state.score++;
  state.answers.push({ correct });
  render();
}

function nextQuestion() {
  if (state.current + 1 >= shuffledQuestions.length) { state.finished = true; }
  else { state.current++; state.selected = null; }
  render();
}

function restart() {
  shuffledQuestions = shuffle(questions);
  state = { current: 0, selected: null, score: 0, finished: false, answers: [] };
  render();
}

render();
</script>
</body>
</html>
