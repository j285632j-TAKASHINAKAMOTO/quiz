<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>基本情報技術者 模擬問題</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%);
  min-height: 100vh;
  padding: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
}
button { font-family: inherit; }
@keyframes pop {
  0% { transform: scale(0.5); opacity: 0; }
  70% { transform: scale(1.1); }
  100% { transform: scale(1); opacity: 1; }
}
</style>
</head>
<body>
<div id="app"></div>
<script>
const questions = [
  {
    field: "ネットワーク",
    question: "IPアドレス「192.168.1.0/24」のサブネットマスクはどれか。",
    choices: { ア: "255.0.0.0", イ: "255.255.0.0", ウ: "255.255.255.0", エ: "255.255.255.128" },
    answer: "ウ",
    explanation: "/24 は先頭から24ビットが1であることを意味します。2進数で 11111111.11111111.11111111.00000000 = 255.255.255.0 になります。"
  },
  {
    field: "データベース",
    question: "関係データベースにおいて、表から重複行を除いた結果を取得するSQL句はどれか。",
    choices: { ア: "DISTINCT", イ: "UNIQUE", ウ: "GROUP BY", エ: "HAVING" },
    answer: "ア",
    explanation: "SELECT DISTINCT カラム名 FROM テーブル名 と記述することで、重複する行を除いた結果セットを取得できます。UNIQUE は制約、GROUP BY は集計、HAVING は集計後の絞り込みに使います。"
  },
  {
    field: "セキュリティ",
    question: "公開鍵暗号方式において、送信者が受信者へ暗号文を送る際に使用する鍵はどれか。",
    choices: { ア: "送信者の秘密鍵", イ: "送信者の公開鍵", ウ: "受信者の秘密鍵", エ: "受信者の公開鍵" },
    answer: "エ",
    explanation: "公開鍵暗号では「受信者の公開鍵で暗号化し、受信者の秘密鍵で復号」します。公開鍵は誰でも使えるため、送信者は受信者の公開鍵で暗号化して送ります。"
  },
  {
    field: "アルゴリズム",
    question: "n個のデータをバブルソートで整列するときの平均計算量はどれか。",
    choices: { ア: "O(1)", イ: "O(log n)", ウ: "O(n)", エ: "O(n²)" },
    answer: "エ",
    explanation: "バブルソートは隣接する要素を比較・交換を繰り返します。最良・最悪・平均いずれも O(n²) の計算量です。効率が良いとはいえず、大量データには向きません。"
  },
  {
    field: "ハードウェア",
    question: "CPUがメモリにアクセスする際、高速アクセスを実現するために使用される小容量の高速記憶装置はどれか。",
    choices: { ア: "レジスタ", イ: "キャッシュメモリ", ウ: "主記憶（RAM）", エ: "仮想記憶" },
    answer: "イ",
    explanation: "キャッシュメモリはCPUと主記憶の間に配置される高速な記憶装置です。よく使うデータをキャッシュに置くことで、低速な主記憶へのアクセス回数を減らし処理を高速化します。"
  },
  {
    field: "オペレーティングシステム",
    question: "デッドロックが発生する条件として、適切でないものはどれか。",
    choices: { ア: "資源の占有と待機", イ: "資源の横取りが可能", ウ: "循環待機", エ: "相互排他" },
    answer: "イ",
    explanation: "デッドロックの4条件は「相互排他」「占有と待機」「横取り不可（非横取り）」「循環待機」です。「資源の横取りが可能」な状態ではデッドロックは発生しません。"
  },
  {
    field: "情報理論",
    question: "10進数の「13」を2進数に変換した値はどれか。",
    choices: { ア: "1011", イ: "1101", ウ: "1110", エ: "1111" },
    answer: "イ",
    explanation: "13 ÷ 2 = 6 余り 1、6 ÷ 2 = 3 余り 0、3 ÷ 2 = 1 余り 1、1 ÷ 2 = 0 余り 1。余りを下から読むと 1101 となります。"
  },
  {
    field: "ソフトウェア開発",
    question: "ソフトウェアのテスト手法のうち、プログラムの内部構造を考慮せずに入出力の仕様だけからテストケースを設計する手法はどれか。",
    choices: { ア: "ホワイトボックステスト", イ: "ブラックボックステスト", ウ: "回帰テスト", エ: "結合テスト" },
    answer: "イ",
    explanation: "ブラックボックステストは内部構造を意識せず、仕様（入力と期待される出力）だけに基づいてテストします。対してホワイトボックステストはコードの内部構造を元にテストします。"
  },
  {
    field: "データ構造",
    question: "スタック（stack）のデータ操作の特性として正しいものはどれか。",
    choices: { ア: "先に入れたデータが先に取り出される（FIFO）", イ: "後に入れたデータが先に取り出される（LIFO）", ウ: "優先度の高いデータから取り出される", エ: "ランダムな順序でデータが取り出される" },
    answer: "イ",
    explanation: "スタックは LIFO（Last In First Out）構造で、最後に追加したデータが最初に取り出されます。皿を積み重ねるイメージです。FIFO はキューの特性です。"
  },
  {
    field: "プロジェクトマネジメント",
    question: "プロジェクトのスケジュール管理に用いられる、作業の依存関係と日程を矢線で表した図はどれか。",
    choices: { ア: "ガントチャート", イ: "PERT図（アローダイアグラム）", ウ: "フローチャート", エ: "UML図" },
    answer: "イ",
    explanation: "PERT図（アローダイアグラム）は作業を矢線で表し、作業間の依存関係・クリティカルパスを把握できます。ガントチャートは横棒で期間を表し、進捗管理に向いています。"
  }
];

const fieldColors = {
  ネットワーク: "#3b82f6", データベース: "#8b5cf6", セキュリティ: "#ef4444",
  アルゴリズム: "#f59e0b", ハードウェア: "#10b981", オペレーティングシステム: "#6366f1",
  情報理論: "#ec4899", ソフトウェア開発: "#14b8a6", データ構造: "#f97316",
  プロジェクトマネジメント: "#84cc16"
};

let state = {
  current: 0,
  selected: null,
  score: 0,
  finished: false,
  answers: []
};

function render() {
  const app = document.getElementById('app');
  if (state.finished) {
    renderFinished(app);
  } else {
    renderQuestion(app);
  }
}

function renderFinished(app) {
  const pct = Math.round((state.score / questions.length) * 100);
  const grade = pct >= 80 ? "合格ライン突破！🎉" : pct >= 60 ? "もう少し！" : "要復習📚";
  const icon = pct >= 80 ? "🏆" : pct >= 60 ? "📝" : "💪";
  const dots = state.answers.map((a, i) =>
    `<div style="width:32px;height:32px;border-radius:50%;background:${a.correct ? '#10b981' : '#ef4444'};display:flex;align-items:center;justify-content:center;color:white;font-size:16px;font-weight:bold;">${a.correct ? '○' : '×'}</div>`
  ).join('');

  app.innerHTML = `
    <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;">
      <div style="background:white;border-radius:24px;padding:48px 40px;max-width:480px;width:100%;text-align:center;box-shadow:0 25px 60px rgba(0,0,0,0.4);">
        <div style="font-size:64px;margin-bottom:8px;">${icon}</div>
        <h2 style="font-size:26px;font-weight:bold;color:#1e1b4b;margin-bottom:8px;">クイズ終了！</h2>
        <p style="font-size:18px;color:#6b7280;margin-bottom:24px;">${grade}</p>
        <div style="background:#f5f3ff;border-radius:16px;padding:24px 32px;margin-bottom:24px;">
          <div style="font-size:56px;font-weight:bold;color:#4f46e5;">${state.score} <span style="font-size:28px;color:#6b7280;">/ ${questions.length}</span></div>
          <div style="font-size:18px;color:#6b7280;margin-top:4px;">正解率 ${pct}%</div>
        </div>
        <div style="display:flex;gap:8px;justify-content:center;margin-bottom:28px;flex-wrap:wrap;">${dots}</div>
        <button onclick="restart()" style="background:linear-gradient(135deg,#4f46e5,#7c3aed);color:white;border:none;border-radius:12px;padding:14px 40px;font-size:16px;font-weight:bold;cursor:pointer;width:100%;">もう一度挑戦する</button>
      </div>
    </div>`;
}

function renderQuestion(app) {
  const q = questions[state.current];
  const fieldColor = fieldColors[q.field] || "#6b7280";
  const sel = state.selected;
  const isCorrect = sel === q.answer;
  const progress = ((state.current + (sel ? 1 : 0)) / questions.length) * 100;

  const choiceButtons = Object.entries(q.choices).map(([key, val]) => {
    let bg = 'white', border = '2px solid #e5e7eb', color = '#374151', shadow = 'none';
    let circBg = '#f3f4f6', circColor = '#6b7280';
    if (sel) {
      if (key === q.answer) { bg = '#d1fae5'; border = '2px solid #10b981'; color = '#065f46'; shadow = '0 4px 12px rgba(16,185,129,0.2)'; circBg = '#10b981'; circColor = 'white'; }
      else if (key === sel) { bg = '#fee2e2'; border = '2px solid #ef4444'; color = '#991b1b'; circBg = '#ef4444'; circColor = 'white'; }
    }
    const disabled = sel ? 'disabled' : '';
    const hover = sel ? '' : `onmouseenter="this.style.background='#f5f3ff';this.style.borderColor='#8b5cf6'" onmouseleave="this.style.background='white';this.style.borderColor='#e5e7eb'"`;
    return `<button ${disabled} onclick="selectAnswer('${key}')" ${hover} style="background:${bg};border:${border};border-radius:12px;padding:12px 16px;text-align:left;cursor:${sel ? 'default' : 'pointer'};color:${color};font-size:14px;display:flex;align-items:center;gap:12px;box-shadow:${shadow};width:100%;"><span style="min-width:28px;height:28px;border-radius:50%;background:${circBg};color:${circColor};display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:13px;">${key}</span><span>${val}</span></button>`;
  }).join('');

  const nextBtn = sel ? `<button onclick="nextQuestion()" style="margin-top:20px;width:100%;background:linear-gradient(135deg,#4f46e5,#7c3aed);color:white;border:none;border-radius:12px;padding:13px 0;font-size:15px;font-weight:bold;cursor:pointer;">${state.current + 1 < questions.length ? '次の問題へ →' : '結果を見る'}</button>` : '';

  const resultPanel = sel ? `
    <div style="background:white;border-radius:20px;padding:28px;box-shadow:0 20px 50px rgba(0,0,0,0.3);display:flex;flex-direction:column;align-items:center;gap:16px;">
      <div style="width:110px;height:110px;border-radius:50%;background:${isCorrect ? 'linear-gradient(135deg,#10b981,#34d399)' : 'linear-gradient(135deg,#ef4444,#f87171)'};display:flex;align-items:center;justify-content:center;box-shadow:${isCorrect ? '0 8px 30px rgba(16,185,129,0.4)' : '0 8px 30px rgba(239,68,68,0.4)'};animation:pop 0.3s ease;">
        <span style="font-size:58px;color:white;line-height:1;font-weight:bold;">${isCorrect ? '○' : '×'}</span>
      </div>
      <p style="font-size:18px;font-weight:bold;color:${isCorrect ? '#065f46' : '#991b1b'};margin:0;">${isCorrect ? '正解！' : `不正解 (正解：${q.answer})`}</p>
      <div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:12px;padding:16px 18px;width:100%;">
        <p style="font-size:12px;font-weight:bold;color:#64748b;margin-bottom:6px;text-transform:uppercase;letter-spacing:1px;">解説</p>
        <p style="font-size:14px;color:#334155;line-height:1.75;margin:0;">${q.explanation}</p>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:center;">
        ${state.answers.map(a => `<div style="width:26px;height:26px;border-radius:50%;background:${a.correct ? '#10b981' : '#ef4444'};display:flex;align-items:center;justify-content:center;color:white;font-size:13px;font-weight:bold;">${a.correct ? '○' : '×'}</div>`).join('')}
      </div>
    </div>` : '';

  const gridStyle = sel
    ? 'display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start;'
    : 'display:grid;grid-template-columns:1fr;gap:16px;align-items:start;';

  app.innerHTML = `
    <div style="max-width:900px;width:100%;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
        <h1 style="color:white;font-size:18px;font-weight:bold;margin:0;">基本情報技術者 模擬問題</h1>
        <div style="color:#a5b4fc;font-size:15px;">${state.current + 1} / ${questions.length}問</div>
      </div>
      <div style="background:rgba(255,255,255,0.15);border-radius:99px;height:6px;margin-bottom:20px;">
        <div style="background:linear-gradient(90deg,#818cf8,#c084fc);border-radius:99px;height:6px;width:${progress}%;transition:width 0.4s ease;"></div>
      </div>
      <div style="${gridStyle}">
        <div style="background:white;border-radius:20px;padding:28px;box-shadow:0 20px 50px rgba(0,0,0,0.3);">
          <div style="margin-bottom:14px;">
            <span style="background:${fieldColor};color:white;border-radius:99px;padding:4px 14px;font-size:12px;font-weight:bold;">${q.field}</span>
          </div>
          <p style="font-size:16px;font-weight:bold;color:#1e1b4b;line-height:1.7;margin-bottom:22px;">問${state.current + 1}. ${q.question}</p>
          <div style="display:flex;flex-direction:column;gap:10px;">${choiceButtons}</div>
          ${nextBtn}
        </div>
        ${resultPanel}
      </div>
    </div>`;
}

function selectAnswer(key) {
  if (state.selected !== null) return;
  state.selected = key;
  const correct = key === questions[state.current].answer;
  if (correct) state.score++;
  state.answers.push({ correct });
  render();
}

function nextQuestion() {
  if (state.current + 1 >= questions.length) {
    state.finished = true;
  } else {
    state.current++;
    state.selected = null;
  }
  render();
}

function restart() {
  state = { current: 0, selected: null, score: 0, finished: false, answers: [] };
  render();
}

render();
</script>
</body>
</html>
