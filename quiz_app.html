<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width"><title>基本情報技術者 模擬問題</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:sans-serif;background:linear-gradient(135deg,#1e1b4b,#312e81);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:16px}.container{max-width:520px;width:100%}.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}.header h1{color:#fff;font-size:16px}.card{background:#fff;border-radius:20px;padding:24px 20px;margin-bottom:14px;box-shadow:0 20px 50px rgba(0,0,0,0.3)}.badge{display:inline-block;color:#fff;border-radius:99px;padding:4px 14px;font-size:12px;font-weight:bold}.question{font-size:15px;font-weight:bold;color:#1e1b4b;margin-bottom:20px}.choices{display:flex;flex-direction:column;gap:10px}.choice-btn{background:#fff;border:2px solid #e5e7eb;border-radius:12px;padding:12px 14px;cursor:pointer;color:#374151;width:100%}.choice-btn.correct{background:#d1fae5;border-color:#10b981;color:#065f46}</style></head><body><div class="container"><div id="quiz-area"><div class="header"><h1>基本情報技術者 模擬問題</h1><span id="counter">1 / 10問</span></div><div class="card"><span class="badge" id="field-badge">分野</span><p class="question" id="question-text">問題文</p><div id="choices"></div></div></div></div><script>const q=[{field:"ネットワーク",q:"IPアドレス「192.168.1.0/24」のサブネットマスク",c:["255.0.0.0","255.255.0.0","255.255.255.0","255.255.255.128"],a:2},{field:"DB",q:"重複行を除いたSQL句",c:["DISTINCT","UNIQUE","GROUP BY","HAVING"],a:0},{field:"セキュリティ",q:"公開鍵暗号で使用する鍵",c:["送秘密鍵","送公開鍵","受秘密鍵","受公開鍵"],a:3},{field:"アルゴリズム",q:"バブルソート平均計算量",c:["O(1)","O(logn)","O(n)","O(n²)"],a:3},{field:"プログラミング",q:"JS遅延実行メソッド",c:["setInterval()","setTimeout()","setImmediate()","setAnimation()"],a:1},{field:"システム",q:"OS主な役割",c:["ゲーム開発","ハードウェア管理","ブラウザ","DB構築"],a:1},{field:"クラウド",q:"SaaS例",c:["AWSEC2","Microsoft365","VMware","Linux"],a:1},{field:"AI",q:"過学習を防ぐ方法",c:["訓練データ増","検証+正則化","複雑モデル","テストのみ"],a:1},{field:"Web",q:"REST更新メソッド",c:["GET","POST","PUT/PATCH","DELETE"],a:2},{field:"暗号化",q:"公開鍵特徴",c:["鍵配送なし","速度速い","鍵ペア","鍵数少ない"],a:2}];let i=0,s=0;function r(){const x=q[i];document.getElementById("field-badge").textContent=x.field;document.getElementById("question-text").textContent=x.q;document.getElementById("counter").textContent=(i+1)+"/"+q.length+"問";const d=document.getElementById("choices");d.innerHTML="";x.c.forEach((ch,j)=>{const b=document.createElement("button");b.className="choice-btn";b.textContent=ch;b.onclick=()=>{if(j===x.a)s++;i++;i<q.length?r():alert("完了！ スコア: "+s+" / "+q.length)};d.appendChild(b)})}r();</script></body></html>
